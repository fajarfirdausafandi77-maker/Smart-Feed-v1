// ── LP SOLVER ──────────────────────────────────────
function solveSimplex(cMin, rawCons, n) {
  const BIG=1e6, EPS=1e-8, m=rawCons.length;
  const cons=rawCons.map(c=>c.b<-EPS?{type:c.type==="le"?"ge":c.type==="ge"?"le":"eq",a:c.a.map(v=>-v),b:-c.b}:c);
  let nS=0,nA=0;
  for(const c of cons){if(c.type==="le")nS++;else if(c.type==="ge"){nS++;nA++;}else nA++;}
  const N=n+nS+nA,T2=Array.from({length:m+1},()=>new Float64Array(N+1));
  const basis=new Int32Array(m),isArt=new Uint8Array(N);
  let si=n,ai=n+nS;
  for(let i=0;i<m;i++){
    const c=cons[i];
    for(let j=0;j<n;j++)T2[i][j]=c.a[j];
    T2[i][N]=Math.max(0,c.b);
    if(c.type==="le"){T2[i][si]=1;basis[i]=si++;}
    else if(c.type==="ge"){T2[i][si++]=-1;T2[i][ai]=1;isArt[ai]=1;basis[i]=ai++;}
    else{T2[i][ai]=1;isArt[ai]=1;basis[i]=ai++;}
  }
  for(let j=0;j<n;j++)T2[m][j]=-cMin[j];
  for(let j=n+nS;j<N;j++)T2[m][j]=-BIG;
  for(let i=0;i<m;i++){if(isArt[basis[i]]){const f=T2[m][basis[i]];for(let j=0;j<=N;j++)T2[m][j]-=f*T2[i][j];}}
  for(let it=0;it<200000;it++){
    let pc=-1,best=EPS;
    for(let j=0;j<N;j++)if(T2[m][j]>best){best=T2[m][j];pc=j;}
    if(pc<0)break;
    let pr=-1,minR=Infinity;
    for(let i=0;i<m;i++){if(T2[i][pc]>EPS){const r=T2[i][N]/T2[i][pc];if(r<minR){minR=r;pr=i;}}}
    if(pr<0)return{status:"unbounded"};
    basis[pr]=pc;
    const pv=T2[pr][pc];
    for(let j=0;j<=N;j++)T2[pr][j]/=pv;
    for(let i=0;i<=m;i++){if(i!==pr){const f=T2[i][pc];if(Math.abs(f)>1e-13)for(let j=0;j<=N;j++)T2[i][j]-=f*T2[pr][j];}}
  }
  for(let i=0;i<m;i++)if(isArt[basis[i]]&&T2[i][N]>1e-4)return{status:"infeasible"};
  const x=new Array(n).fill(0);
  for(let i=0;i<m;i++)if(basis[i]<n)x[basis[i]]=Math.max(0,T2[i][N]);
  return{status:"optimal",x};
}

function runOptimize(ings,inclBounds,nutCons){
  const n=ings.length;
  if(n<2)return{status:"error",msg:"Pilih minimal 2 bahan pakan."};
  const lb=ings.map(g=>inclBounds[g.id]?.min??0);
  const ub=ings.map(g=>inclBounds[g.id]?.max??100);
  const costC=ings.map(g=>g.price/(g.dm/100));
  const K=100-lb.reduce((s,v)=>s+v,0);
  if(K<-1e-4)return{status:"infeasible",msg:"Total minimum inclusion melebihi 100%."};
  const cons=[];
  for(let i=0;i<n;i++){const a=new Array(n).fill(0);a[i]=1;cons.push({type:"le",a,b:ub[i]-lb[i]});}
  cons.push({type:"eq",a:new Array(n).fill(1),b:K});
  for(const nc of nutCons){
    if(!nc.active)continue;
    const lbAdj=ings.reduce((s,g,i)=>s+(g[nc.key]||0)*lb[i]/100,0);
    const coeffs=ings.map(g=>(g[nc.key]||0)/100);
    if(nc.max!=null)cons.push({type:"le",a:coeffs,b:nc.max-lbAdj});
    if(nc.min!=null)cons.push({type:"ge",a:coeffs,b:nc.min-lbAdj});
  }
  const res=solveSimplex(costC,cons,n);
  if(res.status!=="optimal")return{status:"infeasible",msg:"Tidak ada solusi. Coba perlonggar batasan nutrisi atau inklusi bahan."};
  const xDM=res.x.map((q,i)=>q+lb[i]);
  const xAFraw=xDM.map((v,i)=>v*(100/ings[i].dm));
  const sumAF=xAFraw.reduce((s,v)=>s+v,0);
  const xAF=xAFraw.map(v=>sumAF>0?v/sumAF*100:0);
  const NKEYS=["cp","ee","cf","ash","nfe","tdn","me","nem","neg","ca","p","ndf","adf"];
  const nutLvls=Object.fromEntries(NKEYS.map(k=>[k,ings.reduce((s,g,i)=>s+(g[k]||0)*xDM[i]/100,0)]));
  const costDM=ings.reduce((s,g,i)=>s+(g.price/(g.dm/100))*xDM[i]/100,0);
  return{
    status:"optimal",
    inclusions:ings.map((g,i)=>({...g,pctDM:xDM[i],pctAF:xAF[i],costContrib:(g.price/(g.dm/100))*xDM[i]/100})).filter(r=>r.pctDM>0.01),
    nutLvls,costDM
  };
}

  const a=ANIMALS[aId];

  const ph=a.phases.find(p=>p.id===pId)||a.phases[0];
  return NUT_META.map(nm=>({...nm,active:ph.active.includes(nm.key),min:ph.reqs[nm.key]?.min??null,max:ph.reqs[nm.key]?.max??null}));
}

}

function NutBar({minV,maxV,val,color,sc}){
  const lo=minV*0.8,hi=maxV*1.2,rng=hi-lo||1;
  const toB=v=>Math.max(0,Math.min(100,((v-lo)/rng)*100));
  return(
    <div style={{height:6,background:T.bg,borderRadius:3,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",left:toB(minV)+"%",right:(100-toB(maxV))+"%",height:"100%",background:color+"33"}}/>
      <div style={{position:"absolute",left:toB(val)+"%",top:0,width:3,height:"100%",background:sc,borderRadius:2,transform:"translateX(-50%)"}}/>
    </div>
  );
}

  const selIngs=useMemo(()=>feedLib.filter(f=>selIds.has(f.id)),[feedLib,selIds]);

  const toggleIng=useCallback(id=>{setSelIds(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});},[]);
  const updBound=useCallback((id,type,raw)=>{const v=Math.max(0,parseFloat(raw)||0);setBounds(p=>({...p,[id]:{...(p[id]||{min:0,max:100}),[type]:v}}));},[]);
  const updNut=useCallback((key,field,val)=>{setNutReqs(p=>p.map(n=>n.key!==key?n:{...n,[field]:field==="active"?val:(val===""?null:parseFloat(val))}));},[]);

  function changeAnimal(aId){setAnimalId(aId);const pid=ANIMALS[aId]?.phases[0]?.id||"";setPhaseId(pid);setNutReqs(buildNutReqs(aId,pid));}
  function changePhase(pid){setPhaseId(pid);setNutReqs(buildNutReqs(animalId,pid));}
  function saveIng(ing){
    if(ing._isNew){const nid=Math.max(...feedLib.map(f=>f.id))+1;const{_isNew,...r}=ing;setFeedLib(p=>[...p,{...r,id:nid}]);}
    else{const{_isNew,...r}=ing;setFeedLib(p=>p.map(f=>f.id===r.id?r:f));}
    setEditIng(null);
  }
  function deleteIng(id){setFeedLib(p=>p.filter(f=>f.id!==id));setSelIds(p=>{const s=new Set(p);s.delete(id);return s;});setEditIng(null);}
  function runOpt(){setRunning(true);setResult(null);setTimeout(()=>{setResult(runOptimize(selIngs,bounds,nutReqs));setRunning(false);setTab("hasil");},60);}

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",width:"100%",maxWidth:430,background:T.bg,fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",overflow:"hidden"}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:T.primary}}>🌿 Smart Feed</div>
            <div style={{fontSize:10,color:T.muted,marginTop:1}}>by Fajar Afandi · Feed Optimizer</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{display:"flex",background:T.bg,border:"1px solid "+T.border,borderRadius:20,padding:2}}>
              {[["BK",true],["Segar",false]].map(([lbl,val])=>(
                <button key={lbl} onClick={()=>setDmBase(val)} style={{padding:"3px 10px",borderRadius:16,border:"none",background:dmBase===val?T.primary:"transparent",color:dmBase===val?"#fff":T.muted,fontSize:10,fontWeight:dmBase===val?700:400,cursor:"pointer",transition:"all 0.15s"}}>{lbl}</button>
              ))}
            </div>
            <div style={{background:T.primaryLight,color:T.primary,fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:20}}>{selIds.size} bahan</div>

        {tab==="target"&&<TargetTab nutReqs={nutReqs} animalId={animalId} phaseId={phaseId} changeAnimal={changeAnimal} changePhase={changePhase} updNut={updNut}/>}
        {tab==="hasil"&&<HasilTab result={result} nutReqs={nutReqs} running={running} onRun={runOpt} selCount={selIds.size} dmBase={dmBase} animalId={animalId} phaseId={phaseId}/>}

      </div>
    </div>
  );
}

// ── FORMULA TAB ────────────────────────────────────
function FormulaTab({feedLib,selIds,bounds,toggle,updBound}){
  const sel=feedLib.filter(f=>selIds.has(f.id));
  const unsel=feedLib.filter(f=>!selIds.has(f.id));
  const totalMin=sel.reduce((s,f)=>s+(bounds[f.id]?.min||0),0);
  const over=totalMin>100;
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:T.white,padding:"10px 14px 8px",flexShrink:0,borderBottom:"1px solid "+T.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:over?"#fef2f2":T.bg,border:"1.5px solid "+(over?"#fca5a5":T.border),borderRadius:10,padding:"8px 14px"}}>
          <span style={{fontSize:13,color:over?T.danger:T.muted}}>Total min inklusi</span>
          <span style={{fontSize:14,fontWeight:700,color:over?T.danger:totalMin>80?T.warn:T.primary}}>{totalMin.toFixed(1)}%</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px 70px"}}>
        {sel.length===0&&<div style={{textAlign:"center",color:T.muted,padding:40,fontSize:13,lineHeight:2}}>Belum ada bahan dipilih.<br/>Buka tab 🌾 Library untuk memilih.</div>}
        {sel.map(ing=>{
          const cat=CAT[ing.cat],b=bounds[ing.id]||{min:0,max:100};
          return(
            <div key={ing.id} style={{background:T.white,borderRadius:13,border:"1.5px solid "+cat.color+"33",marginBottom:8,padding:"12px 14px",boxShadow:"0 1px 3px #0001"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:4,height:34,background:cat.color,borderRadius:2,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
                  <div style={{fontSize:11,color:T.muted}}>Rp{(ing.price/(ing.dm/100)).toFixed(0)}/kg BK</div>
                </div>
                <button onClick={()=>toggle(ing.id)} style={{width:28,height:28,borderRadius:8,background:"#f1f5f9",border:"none",color:T.muted,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
              </div>
              {[["Min","min",0,b.max],["Max","max",b.min,100]].map(([lbl,type,lo,hi])=>(
                <div key={type} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,width:"100%"}}>
                  <span style={{width:26,fontSize:11,color:T.muted,fontWeight:600,flexShrink:0,textAlign:"right"}}>{lbl}</span>
                  <input type="range" min={lo} max={hi} step={0.5} value={b[type]} onChange={e=>updBound(ing.id,type,e.target.value)} style={{flex:1,accentColor:cat.color,cursor:"pointer",minWidth:0,width:0}}/>
                  <input type="number" min={lo} max={hi} step={0.5} value={b[type]} onChange={e=>updBound(ing.id,type,e.target.value)} style={{width:42,flexShrink:0,background:T.bg,border:"1.5px solid "+cat.color+"55",borderRadius:7,padding:"4px 0",color:cat.color,fontSize:12,fontWeight:700,textAlign:"center",outline:"none"}}/>
                  <span style={{fontSize:11,color:T.muted,flexShrink:0,width:12}}>%</span>
                </div>
              ))}
              <div style={{height:5,background:T.bg,borderRadius:3,position:"relative",overflow:"hidden",marginTop:2}}>
                <div style={{position:"absolute",left:b.min+"%",right:(100-b.max)+"%",height:"100%",background:cat.color+"44",borderRadius:3}}/>
              </div>
            </div>
          );
        })}
        {unsel.length>0&&sel.length>0&&<div style={{fontSize:11,color:T.muted,padding:"8px 2px 4px",fontWeight:500}}>TIDAK AKTIF — ketuk untuk aktifkan</div>}
        {unsel.map(ing=>{
          const cat=CAT[ing.cat];
          return(
            <div key={ing.id} onClick={()=>toggle(ing.id)} style={{background:T.white,borderRadius:11,border:"1px solid "+T.border,marginBottom:5,padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,opacity:0.55}}>
              <div style={{width:3,height:26,background:cat.color,borderRadius:2,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:T.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
                <div style={{fontSize:10,color:T.muted}}>{ing.code} · {cat.label}</div>
              </div>
              <span style={{color:T.primary,fontSize:18,fontWeight:700,flexShrink:0}}>+</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── HASIL TAB ──────────────────────────────────────
function HasilTab({result,nutReqs,running,onRun,selCount,dmBase,animalId,phaseId}){
  if(running)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12}}>
      <div style={{fontSize:48}}>⚙️</div>
      <div style={{fontSize:15,fontWeight:600,color:T.primary}}>Menjalankan optimasi...</div>
      <div style={{fontSize:12,color:T.muted}}>Simplex Big-M Method</div>
    </div>
  );
  if(!result)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center",gap:10}}>
      <div style={{fontSize:52}}>📊</div>
      <div style={{fontSize:17,fontWeight:700,color:T.text}}>Siap Diformulasi</div>
      <div style={{fontSize:13,color:T.muted,lineHeight:1.9}}>{selCount<2?"Pilih minimal 2 bahan pakan\ndi tab Formula.":selCount+" bahan dipilih.\nTekan ▶ untuk mulai."}</div>
      <button onClick={onRun} disabled={selCount<2} style={{marginTop:8,padding:"13px 32px",background:selCount<2?"#e2e8f0":T.primary,border:"none",borderRadius:14,color:selCount<2?T.muted:"#fff",fontSize:14,fontWeight:700,cursor:selCount<2?"not-allowed":"pointer",boxShadow:selCount>=2?"0 4px 16px #16a34a33":"none"}}>▶ Hitung Formulasi</button>
    </div>
  );
  if(result.status!=="optimal")return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center",gap:10}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{fontSize:16,fontWeight:700,color:T.danger}}>Tidak Ada Solusi</div>
      <div style={{fontSize:13,color:T.muted,lineHeight:1.8,maxWidth:280}}>{result.msg}</div>
      <button onClick={onRun} style={{marginTop:8,padding:"12px 24px",background:T.bg,border:"1.5px solid "+T.border,borderRadius:12,color:T.text,fontSize:13,cursor:"pointer"}}>🔄 Coba Lagi</button>
    </div>
  );
  const{inclusions,nutLvls,costDM}=result;
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:T.primary,padding:"14px 16px 10px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:10,color:"#a7f3d0",marginBottom:1}}>Biaya ransum / kg BK</div>
            <div style={{fontSize:22,fontWeight:800,color:"#fff"}}>Rp {costDM.toLocaleString("id",{maximumFractionDigits:0})}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#a7f3d0",marginBottom:1}}>Per ton BK</div>
            <div style={{fontSize:15,fontWeight:700,color:"#d1fae5"}}>Rp {(costDM*1000).toLocaleString("id",{maximumFractionDigits:0})}</div>
          </div>
        </div>
        <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex",background:"rgba(255,255,255,0.15)"}}>
          {inclusions.map(ing=><div key={ing.id} style={{width:ing.pctDM+"%",background:CAT[ing.cat].color,opacity:0.9}}/>)}
        </div>
        <button onClick={()=>printPDF(result,nutReqs,animalId,phaseId,dmBase)} style={{marginTop:10,width:"100%",padding:"8px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:9,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          📄 Download PDF / Print
        </button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px 70px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:600,letterSpacing:0.5}}>KOMPOSISI ({dmBase?"% BK":"% As-Fed"})</div>
          <div style={{fontSize:10,color:T.muted,background:T.bg,padding:"2px 8px",borderRadius:8,border:"1px solid "+T.border}}>Basis: {dmBase?"BK":"Segar"}</div>
        </div>
        {inclusions.map(ing=>{
          const cat=CAT[ing.cat],pct=dmBase?ing.pctDM:ing.pctAF;
          return(
            <div key={ing.id} style={{background:T.white,borderRadius:12,border:"1.5px solid "+T.border,marginBottom:6,padding:"11px 12px",boxShadow:"0 1px 3px #0001"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <div style={{width:4,height:30,background:cat.color,borderRadius:2,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:T.text,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
                  <div style={{fontSize:11,color:T.muted}}>Rp{ing.costContrib.toLocaleString("id",{maximumFractionDigits:0})}/kg BK kontribusi</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:17,fontWeight:800,color:cat.color}}>{pct.toFixed(1)}<span style={{fontSize:11}}>%</span></div>
                  {!dmBase&&<div style={{fontSize:9,color:T.muted}}>BK: {ing.pctDM.toFixed(1)}%</div>}
                </div>
              </div>
              <div style={{height:5,background:T.bg,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:Math.min(100,pct)+"%",height:"100%",background:cat.color,borderRadius:3}}/>
              </div>
            </div>
          );
        })}
        <div style={{fontSize:11,color:T.muted,fontWeight:600,letterSpacing:0.5,marginBottom:6,marginTop:8}}>STATUS NUTRISI (basis BK)</div>
        {nutReqs.filter(nr=>nr.active&&(nr.min!=null||nr.max!=null)).map(nr=>{
          const val=nutLvls[nr.key]||0;
          const low=nr.min!=null&&val<nr.min-0.001,high=nr.max!=null&&val>nr.max+0.001,ok=!low&&!high;
          const sc=ok?"#16a34a":T.danger;
          return(
            <div key={nr.key} style={{background:T.white,borderRadius:12,border:"1.5px solid "+(ok?"#a7f3d0":"#fca5a5"),marginBottom:6,padding:"11px 12px",boxShadow:"0 1px 3px #0001"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:sc}}/>
                  <span style={{fontSize:12,color:T.text,fontWeight:500}}>{nr.label}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:14,fontWeight:700,color:sc}}>{val.toFixed(2)}</span>
                  <span style={{fontSize:10,color:T.muted}}>{nr.unit}</span>
                  <span style={{fontSize:10,background:ok?T.primaryLight:T.dangerLight,color:sc,padding:"1px 6px",borderRadius:8,fontWeight:600}}>{ok?"✓ OK":low?"↓ LOW":"↑ HIGH"}</span>
                </div>
              </div>
              {nr.min!=null&&nr.max!=null&&<NutBar minV={nr.min} maxV={nr.max} val={val} color={nr.color} sc={sc}/>}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:T.muted}}>
                <span>{nr.min!=null?"min "+nr.min:""}</span>
                <span>{nr.max!=null?"max "+nr.max:""}</span>
              </div>
            </div>
          );
        })}
        <button onClick={onRun} style={{width:"100%",padding:"13px",background:T.primary,border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:6}}>🔄 Hitung Ulang</button>
      </div>
    </div>
  );
}

            <div style={{gridColumn:"1 / -1"}}>
              <label style={{fontSize:10,color:T.muted,fontWeight:600}}>NAMA BAHAN *</label>
              <input value={ing.name} onChange={e=>upd("name",e.target.value)} placeholder="Jagung Kuning Giling" style={{width:"100%",background:T.bg,border:"1.5px solid "+T.border,borderRadius:9,padding:"8px 10px",fontSize:13,color:T.text,outline:"none",marginTop:3,boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{fontSize:10,color:T.muted,fontWeight:600}}>KODE *</label>
              <input value={ing.code} onChange={e=>upd("code",e.target.value.toUpperCase().slice(0,6))} placeholder="JKG" style={{width:"100%",background:T.bg,border:"1.5px solid "+T.border,borderRadius:9,padding:"8px 10px",fontSize:13,color:T.text,outline:"none",marginTop:3,boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{fontSize:10,color:T.muted,fontWeight:600}}>KATEGORI</label>
              <select value={ing.cat} onChange={e=>upd("cat",e.target.value)} style={{width:"100%",background:T.bg,border:"1.5px solid "+T.border,borderRadius:9,padding:"8px 10px",fontSize:13,color:T.text,outline:"none",marginTop:3,boxSizing:"border-box"}}>
                {Object.entries(CAT).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
          <div style={{fontSize:10,color:T.muted,fontWeight:600,marginBottom:8,letterSpacing:0.4}}>NILAI NUTRISI (basis BK)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {fields.map(f=>(
              <div key={f.key}>
                <label style={{fontSize:10,color:T.muted}}>{f.label}</label>
                <div style={{display:"flex",alignItems:"center",background:T.bg,border:"1px solid "+T.border,borderRadius:8,marginTop:3,overflow:"hidden"}}>
                  <input type="number" step="0.01" value={ing[f.key]??0} onChange={e=>upd(f.key,parseFloat(e.target.value)||0)} style={{flex:1,background:"none",border:"none",padding:"6px 8px",fontSize:12,color:T.text,outline:"none",minWidth:0}}/>
                  <span style={{fontSize:9,color:T.muted,padding:"0 6px",flexShrink:0,whiteSpace:"nowrap"}}>{f.unit}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,marginTop:18}}>
            {!isNew&&<button onClick={()=>onDelete(ing.id)} style={{padding:"11px 14px",background:T.dangerLight,border:"none",borderRadius:11,color:T.danger,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>🗑 Hapus</button>}
            <button onClick={()=>valid&&onSave(ing)} disabled={!valid} style={{flex:1,padding:"12px",border:"none",borderRadius:11,background:valid?T.primary:"#e2e8f0",color:valid?"#fff":T.muted,fontSize:13,fontWeight:700,cursor:valid?"pointer":"not-allowed"}}>
              {isNew?"➕ Tambahkan":"💾 Simpan"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── RENDER ─────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
